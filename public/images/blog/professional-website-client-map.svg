<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Professional website client acquisition map</title>
  <desc id="desc">A website structure map showing offer, proof, services, content, call to action and measurement as parts of a client-focused professional website.</desc>
  <rect width="1200" height="630" rx="32" fill="#0F172A"/>
  <circle cx="112" cy="120" r="98" fill="#0B1220"/>
  <circle cx="1050" cy="98" r="132" fill="#172554"/>
  <circle cx="1030" cy="512" r="118" fill="#064E3B"/>
  <text x="84" y="104" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="0.2em">WEBSITE</text>
  <text x="84" y="152" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="800">A site that helps</text>
  <text x="84" y="206" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="800">clients decide</text>
  <text x="86" y="244" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">Clarity first. Design and SEO support the decision.</text>

  <rect x="92" y="324" width="190" height="142" rx="22" fill="#172554" stroke="#60A5FA" stroke-width="2"/>
  <text x="187" y="370" text-anchor="middle" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Offer</text>
  <text x="187" y="404" text-anchor="middle" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="16">what you do</text>
  <text x="187" y="430" text-anchor="middle" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="16">who it is for</text>

  <rect x="312" y="324" width="190" height="142" rx="22" fill="#111827" stroke="#38BDF8" stroke-width="2"/>
  <text x="407" y="370" text-anchor="middle" fill="#E0F2FE" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Trust</text>
  <text x="407" y="404" text-anchor="middle" fill="#BAE6FD" font-family="Inter, Arial, sans-serif" font-size="16">proof</text>
  <text x="407" y="430" text-anchor="middle" fill="#BAE6FD" font-family="Inter, Arial, sans-serif" font-size="16">process</text>

  <rect x="532" y="324" width="190" height="142" rx="22" fill="#064E3B" stroke="#22C55E" stroke-width="2"/>
  <text x="627" y="370" text-anchor="middle" fill="#DCFCE7" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Services</text>
  <text x="627" y="404" text-anchor="middle" fill="#BBF7D0" font-family="Inter, Arial, sans-serif" font-size="16">clear pages</text>
  <text x="627" y="430" text-anchor="middle" fill="#BBF7D0" font-family="Inter, Arial, sans-serif" font-size="16">specific problems</text>

  <rect x="752" y="324" width="190" height="142" rx="22" fill="#111827" stroke="#A78BFA" stroke-width="2"/>
  <text x="847" y="370" text-anchor="middle" fill="#EDE9FE" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Content</text>
  <text x="847" y="404" text-anchor="middle" fill="#DDD6FE" font-family="Inter, Arial, sans-serif" font-size="16">answers</text>
  <text x="847" y="430" text-anchor="middle" fill="#DDD6FE" font-family="Inter, Arial, sans-serif" font-size="16">search intent</text>

  <rect x="972" y="324" width="146" height="142" rx="22" fill="#020617" stroke="#94A3B8" stroke-width="2"/>
  <text x="1045" y="370" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">CTA</text>
  <text x="1045" y="404" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="16">contact</text>
  <text x="1045" y="430" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="16">next step</text>

  <path d="M282 395H312M502 395H532M722 395H752M942 395H972" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <rect x="84" y="520" width="1034" height="48" rx="24" fill="#020617" stroke="#334155"/>
  <text x="601" y="551" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">A professional website should reduce doubt before asking for contact.</text>
</svg>
