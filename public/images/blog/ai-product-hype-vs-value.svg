<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI product value vs hype</title>
  <desc id="desc">A split illustration showing a useful AI workflow on the left and empty hype on the right.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="glow" x1="190" y1="120" x2="1030" y2="610" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.34"/>
      <stop offset="0.55" stop-color="#A78BFA" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0.20"/>
    </linearGradient>
    <linearGradient id="panel" x1="220" y1="150" x2="980" y2="545" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1220" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#111827" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="leftCard" x1="250" y1="220" x2="560" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#172554"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="rightCard" x1="640" y1="220" x2="950" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#312E81"/>
      <stop offset="1" stop-color="#4C1D95"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="48" y="48" width="1104" height="579" rx="36" fill="url(#glow)" opacity="0.35"/>
  <rect x="96" y="92" width="1008" height="491" rx="32" fill="url(#panel)" stroke="#334155" stroke-opacity="0.5"/>

  <circle cx="170" cy="138" r="76" fill="#38BDF8" fill-opacity="0.11" filter="url(#blur)"/>
  <circle cx="1020" cy="140" r="82" fill="#A78BFA" fill-opacity="0.12" filter="url(#blur)"/>
  <circle cx="972" cy="520" r="96" fill="#34D399" fill-opacity="0.10" filter="url(#blur)"/>

  <line x1="600" y1="156" x2="600" y2="526" stroke="#475569" stroke-width="2" stroke-dasharray="10 10"/>

  <text x="172" y="180" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="700" letter-spacing="0.02em">Useful</text>
  <text x="164" y="212" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18">saves time • reduces friction</text>

  <text x="804" y="180" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="700" letter-spacing="0.02em">Hype</text>
  <text x="787" y="212" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18">looks exciting • ships little</text>

  <rect x="210" y="250" width="320" height="214" rx="24" fill="url(#leftCard)" stroke="#60A5FA" stroke-opacity="0.5" filter="url(#shadow)"/>
  <rect x="240" y="282" width="184" height="22" rx="11" fill="#DBEAFE" fill-opacity="0.92"/>
  <rect x="240" y="324" width="254" height="18" rx="9" fill="#93C5FD" fill-opacity="0.82"/>
  <rect x="240" y="354" width="224" height="18" rx="9" fill="#93C5FD" fill-opacity="0.72"/>
  <rect x="240" y="384" width="206" height="18" rx="9" fill="#93C5FD" fill-opacity="0.6"/>
  <rect x="240" y="416" width="132" height="18" rx="9" fill="#86EFAC" fill-opacity="0.9"/>
  <circle cx="482" cy="286" r="18" fill="#22C55E"/>
  <path d="M474 286L480 292L492 278" stroke="#F0FDF4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="650" y="250" width="320" height="214" rx="24" fill="url(#rightCard)" stroke="#C4B5FD" stroke-opacity="0.45" filter="url(#shadow)"/>
  <rect x="680" y="282" width="210" height="22" rx="11" fill="#E9D5FF" fill-opacity="0.92"/>
  <circle cx="920" cy="292" r="18" fill="#F59E0B"/>
  <path d="M920 278V296" stroke="#FFF7ED" stroke-width="4" stroke-linecap="round"/>
  <circle cx="920" cy="304" r="2.5" fill="#FFF7ED"/>

  <rect x="680" y="328" width="74" height="74" rx="18" fill="#F472B6" fill-opacity="0.35"/>
  <rect x="770" y="328" width="74" height="74" rx="18" fill="#F472B6" fill-opacity="0.22"/>
  <rect x="860" y="328" width="74" height="74" rx="18" fill="#F472B6" fill-opacity="0.14"/>
  <circle cx="718" cy="365" r="16" fill="#FDE68A"/>
  <circle cx="808" cy="365" r="16" fill="#F9A8D4"/>
  <circle cx="898" cy="365" r="16" fill="#C4B5FD"/>

  <text x="600" y="520" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18">AI is only useful when it changes the workflow, not the slide deck.</text>
</svg>
