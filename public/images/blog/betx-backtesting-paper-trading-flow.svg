<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">BetX Backtesting and Paper Trading Flow</title>
  <desc id="desc">Pipeline diagram from historical snapshots through strategy evaluation, risk checks, paper trading, settlement, metrics, and strategy review.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfdff" />
      <stop offset="1" stop-color="#edf6f5" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#1e2d42" flood-opacity=".13" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#007fa3" />
    </marker>
    <style>
      text { font-family: Inter, Aptos, Segoe UI, Arial, sans-serif; }
      .title { fill: #0e1320; font-size: 34px; font-weight: 800; }
      .subtitle { fill: #4d596b; font-size: 18px; font-weight: 500; }
      .label { fill: #0e1320; font-size: 19px; font-weight: 800; }
      .small { fill: #4d596b; font-size: 14px; font-weight: 600; }
      .box { filter: url(#shadow); stroke-width: 2; rx: 18; }
      .line { fill: none; stroke: #007fa3; stroke-width: 3; marker-end: url(#arrow); }
      .soft { fill: #eef7fb; stroke: #8ecfe1; }
      .risk { fill: #fff7e6; stroke: #f0c987; }
      .ok { fill: #f0faf4; stroke: #9bd5ae; }
      .review { fill: #f3f0ff; stroke: #cfc7ee; }
    </style>
  </defs>

  <rect width="1200" height="620" fill="url(#bg)" />
  <circle cx="1080" cy="98" r="140" fill="#38d7ff" opacity=".12" />
  <circle cx="130" cy="528" r="150" fill="#58b67b" opacity=".12" />

  <text x="70" y="72" class="title">Backtesting and paper trading loop</text>
  <text x="70" y="106" class="subtitle">The system simulates decisions first, then uses the result to improve strategy quality.</text>

  <rect class="box soft" x="70" y="210" width="178" height="110" />
  <text x="159" y="250" text-anchor="middle" class="label">Snapshots</text>
  <text x="159" y="278" text-anchor="middle" class="small">historical odds</text>

  <rect class="box soft" x="292" y="210" width="178" height="110" />
  <text x="381" y="250" text-anchor="middle" class="label">Strategy</text>
  <text x="381" y="278" text-anchor="middle" class="small">signal detection</text>

  <rect class="box risk" x="514" y="210" width="178" height="110" />
  <text x="603" y="250" text-anchor="middle" class="label">Risk check</text>
  <text x="603" y="278" text-anchor="middle" class="small">limits and exposure</text>

  <rect class="box ok" x="736" y="210" width="178" height="110" />
  <text x="825" y="250" text-anchor="middle" class="label">Paper trade</text>
  <text x="825" y="278" text-anchor="middle" class="small">no real execution</text>

  <rect class="box ok" x="958" y="210" width="178" height="110" />
  <text x="1047" y="250" text-anchor="middle" class="label">Settlement</text>
  <text x="1047" y="278" text-anchor="middle" class="small">result and state</text>

  <rect class="box soft" x="292" y="420" width="234" height="106" />
  <text x="409" y="460" text-anchor="middle" class="label">Metrics</text>
  <text x="409" y="488" text-anchor="middle" class="small">CLV, drawdown, hit rate</text>

  <rect class="box review" x="674" y="420" width="234" height="106" />
  <text x="791" y="460" text-anchor="middle" class="label">Strategy review</text>
  <text x="791" y="488" text-anchor="middle" class="small">reject weak ideas early</text>

  <path class="line" d="M248 265 H292" />
  <path class="line" d="M470 265 H514" />
  <path class="line" d="M692 265 H736" />
  <path class="line" d="M914 265 H958" />
  <path class="line" d="M1047 320 C1047 390, 626 392, 526 450" />
  <path class="line" d="M526 474 H674" />
  <path class="line" d="M790 420 C786 370, 676 342, 630 320" />

  <text x="70" y="572" class="small">Paper trading is a safety layer: it tests the whole workflow before any future exchange execution exists.</text>
</svg>
