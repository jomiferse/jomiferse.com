  <text x="164" y="362" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Configuration</text>

  <rect x="92" y="412" width="300" height="72" rx="18" fill="#111827" stroke="#60A5FA" stroke-width="2"/>
  <circle cx="130" cy="448" r="16" fill="#60A5FA"/>
  <path d="M122 448L128 454L140 440" stroke="#020617" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="164" y="456" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Database</text>

  <rect x="450" y="318" width="300" height="72" rx="18" fill="#111827" stroke="#22C55E" stroke-width="2"/>
  <circle cx="488" cy="354" r="16" fill="#22C55E"/>
  <path d="M480 354L486 360L498 346" stroke="#020617" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="522" y="362" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Observability</text>

  <rect x="450" y="412" width="300" height="72" rx="18" fill="#111827" stroke="#A78BFA" stroke-width="2"/>
  <circle cx="488" cy="448" r="16" fill="#A78BFA"/>
  <path d="M480 448L486 454L498 440" stroke="#020617" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="522" y="456" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Security</text>

  <rect x="808" y="318" width="300" height="72" rx="18" fill="#111827" stroke="#F59E0B" stroke-width="2"/>
  <circle cx="846" cy="354" r="16" fill="#F59E0B"/>
  <path d="M838 354L844 360L856 346" stroke="#020617" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="880" y="362" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Deployment</text>

  <rect x="808" y="412" width="300" height="72" rx="18" fill="#111827" stroke="#94A3B8" stroke-width="2"/>
  <circle cx="846" cy="448" r="16" fill="#94A3B8"/>
  <path d="M838 448L844 454L856 440" stroke="#020617" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="880" y="456" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Rollback</text>

  <rect x="86" y="532" width="1028" height="48" rx="24" fill="#020617" stroke="#334155"/>
  <text x="600" y="563" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">Production work is mostly explicit defaults, visible failures and reversible changes.</text>
