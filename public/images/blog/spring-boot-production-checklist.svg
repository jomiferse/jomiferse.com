<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Spring Boot production checklist</title>
  <desc id="desc">A practical production checklist for Spring Boot covering configuration, database, observability, security, deployment and rollback.</desc>
  <rect width="1200" height="630" rx="32" fill="#0F172A"/>
  <circle cx="140" cy="108" r="112" fill="#064E3B"/>
  <circle cx="1056" cy="116" r="132" fill="#172554"/>
  <circle cx="1000" cy="524" r="116" fill="#0B1220"/>
  <text x="86" y="104" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="0.2em">SPRING BOOT</text>
  <text x="86" y="154" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="800">Production-ready</text>
  <text x="86" y="208" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="800">means boring</text>
  <text x="88" y="246" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">A checklist for services that need to survive real traffic.</text>

  <rect x="92" y="318" width="300" height="72" rx="18" fill="#111827" stroke="#38BDF8" stroke-width="2"/>
  <circle cx="130" cy="354" r="16" fill="#38BDF8"/>
