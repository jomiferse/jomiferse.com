<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">BetX Hexagonal Architecture</title>
  <desc id="desc">Diagram showing BetX domain and application layers in the center, with adapters for market data, persistence, Telegram, schedulers, tests, and future exchanges around them.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff" />
      <stop offset="1" stop-color="#eaf2f8" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1e2d42" flood-opacity=".14" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#007fa3" />
    </marker>
    <style>
      text { font-family: Inter, Aptos, Segoe UI, Arial, sans-serif; }
      .title { fill: #0e1320; font-size: 36px; font-weight: 800; }
      .subtitle { fill: #4d596b; font-size: 18px; font-weight: 500; }
      .label { fill: #0e1320; font-size: 20px; font-weight: 800; }
      .small { fill: #4d596b; font-size: 15px; font-weight: 600; }
      .tiny { fill: #4d596b; font-size: 13px; font-weight: 600; }
      .box { filter: url(#shadow); stroke-width: 2; rx: 18; }
      .line { fill: none; stroke: #007fa3; stroke-width: 3; marker-end: url(#arrow); opacity: .88; }
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)" />
  <circle cx="1020" cy="88" r="150" fill="#38d7ff" opacity=".12" />
  <circle cx="140" cy="610" r="170" fill="#58b67b" opacity=".12" />

  <text x="70" y="74" class="title">BetX architecture</text>
  <text x="70" y="108" class="subtitle">Ports and adapters keep betting rules away from infrastructure details.</text>

  <rect x="373" y="192" width="454" height="278" rx="28" fill="#ffffff" stroke="#bfd7e4" filter="url(#shadow)" />
  <rect x="414" y="232" width="372" height="90" rx="20" fill="#eef7fb" stroke="#8ecfe1" />
  <text x="600" y="266" text-anchor="middle" class="label">Application layer</text>
  <text x="600" y="294" text-anchor="middle" class="small">scan, recommend, backtest, notify</text>

  <rect x="414" y="344" width="372" height="86" rx="20" fill="#f0faf4" stroke="#9bd5ae" />
  <text x="600" y="378" text-anchor="middle" class="label">Domain layer</text>
  <text x="600" y="406" text-anchor="middle" class="small">markets, strategies, risk, trades</text>

  <rect class="box" x="72" y="184" width="224" height="92" fill="#ffffff" stroke="#bfd7e4" />
  <text x="184" y="220" text-anchor="middle" class="label">Market data</text>
  <text x="184" y="248" text-anchor="middle" class="small">odds snapshots</text>

  <rect class="box" x="80" y="424" width="224" height="92" fill="#ffffff" stroke="#cfc7ee" />
  <text x="192" y="460" text-anchor="middle" class="label">Schedulers</text>
  <text x="192" y="488" text-anchor="middle" class="small">scans and jobs</text>

  <rect class="box" x="910" y="168" width="224" height="92" fill="#ffffff" stroke="#f0c987" />
  <text x="1022" y="204" text-anchor="middle" class="label">SQLite</text>
  <text x="1022" y="232" text-anchor="middle" class="small">state and history</text>

  <rect class="box" x="910" y="320" width="224" height="92" fill="#ffffff" stroke="#8ecfe1" />
  <text x="1022" y="356" text-anchor="middle" class="label">Telegram</text>
  <text x="1022" y="384" text-anchor="middle" class="small">notifications</text>

  <rect class="box" x="896" y="496" width="252" height="92" fill="#ffffff" stroke="#9bd5ae" />
  <text x="1022" y="532" text-anchor="middle" class="label">Future adapters</text>
  <text x="1022" y="560" text-anchor="middle" class="small">RabbitMQ, exchanges, web UI</text>

  <rect class="box" x="344" y="548" width="248" height="86" fill="#ffffff" stroke="#bfd7e4" />
  <text x="468" y="582" text-anchor="middle" class="label">JUnit 5</text>
  <text x="468" y="610" text-anchor="middle" class="small">domain and use-case tests</text>

  <rect class="box" x="644" y="548" width="248" height="86" fill="#ffffff" stroke="#cfc7ee" />
  <text x="768" y="582" text-anchor="middle" class="label">Docker / CI</text>
  <text x="768" y="610" text-anchor="middle" class="small">repeatable execution</text>

  <path class="line" d="M296 230 C332 230, 344 252, 406 274" />
  <path class="line" d="M304 470 C354 452, 362 424, 414 386" />
  <path class="line" d="M786 274 C850 250, 856 214, 910 214" />
  <path class="line" d="M786 342 C846 348, 858 366, 910 366" />
  <path class="line" d="M786 406 C862 438, 878 510, 896 542" />
  <path class="line" d="M514 548 C532 510, 552 480, 570 430" />
  <path class="line" d="M724 548 C704 510, 682 482, 660 430" />

  <text x="70" y="668" class="tiny">Core rule: adapters can change; domain decisions should remain testable and explainable.</text>
</svg>
